<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UWR — United Winter RolePlay</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --noir: #06080F;
    --bleu-nuit: #0A0D1A;
    --bleu-profond: #0D1535;
    --bleu-acier: #1E2A5E;
    --violet: #7B5CF0;
    --violet-clair: #9D7FF5;
    --bleu-glace: #4DA6FF;
    --argent: #C0C8E8;
    --blanc: #FFFFFF;
    --or: #C8A84B;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--noir);
    color: var(--argent);
    font-family: 'Inter', sans-serif;
    overflow-x: hidden;
  }

  /* ── CANVAS PARTICULES ── */
  #particles-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 1;
  }

  /* ── NAV ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 2.5rem;
    background: rgba(6,8,15,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(77,166,255,0.12);
  }

  .nav-logo {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .nav-logo img {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: 1px solid rgba(123,92,240,0.4);
  }

  .nav-logo span {
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--argent);
  }

  .nav-links {
    display: flex;
    gap: 2rem;
    list-style: none;
  }

  .nav-links a {
    font-size: 0.78rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--argent);
    text-decoration: none;
    opacity: 0.7;
    transition: opacity 0.2s, color 0.2s;
    font-weight: 500;
  }

  .nav-links a:hover { opacity: 1; color: var(--bleu-glace); }

  /* ── SECTIONS GÉNÉRALES ── */
  section { position: relative; z-index: 2; }

  /* ── HERO ── */
  #accueil {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 6rem 2rem 4rem;
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(123,92,240,0.18) 0%, transparent 70%),
      radial-gradient(ellipse 60% 40% at 20% 100%, rgba(77,166,255,0.12) 0%, transparent 60%),
      linear-gradient(180deg, #06080F 0%, #0A0D1A 50%, #0D1535 100%);
  }

  .hero-logo-wrap {
    position: relative;
    margin-bottom: 2.5rem;
  }

  .hero-logo-wrap::before {
    content: '';
    position: absolute;
    inset: -20px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(123,92,240,0.35) 0%, transparent 70%);
    animation: pulse-halo 3s ease-in-out infinite;
  }

  @keyframes pulse-halo {
    0%, 100% { transform: scale(1); opacity: 0.6; }
    50% { transform: scale(1.08); opacity: 1; }
  }

  .hero-logo {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    border: 2px solid rgba(77,166,255,0.35);
    box-shadow: 0 0 40px rgba(123,92,240,0.5), 0 0 80px rgba(77,166,255,0.2);
    position: relative;
    z-index: 1;
  }

  .hero-title {
    font-family: 'Cinzel', serif;
    font-size: clamp(2.2rem, 6vw, 4rem);
    font-weight: 900;
    letter-spacing: 0.08em;
    line-height: 1.1;
    background: linear-gradient(135deg, #FFFFFF 20%, #C0C8E8 50%, #7B5CF0 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.5rem;
  }

  .hero-sub {
    font-family: 'Cinzel', serif;
    font-size: clamp(0.65rem, 1.5vw, 0.85rem);
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--bleu-glace);
    opacity: 0.8;
    margin-bottom: 2rem;
  }

  .hero-divider {
    width: 120px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--violet), var(--bleu-glace), transparent);
    margin: 0 auto 2.5rem;
  }

  .hero-desc {
    max-width: 680px;
    font-size: 1rem;
    line-height: 1.8;
    color: rgba(192,200,232,0.8);
    margin-bottom: 3rem;
  }

  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.9rem 2.2rem;
    background: linear-gradient(135deg, var(--violet), var(--bleu-acier));
    color: white;
    text-decoration: none;
    font-family: 'Cinzel', serif;
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    border: 1px solid rgba(123,92,240,0.4);
    cursor: pointer;
    transition: all 0.3s;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  }

  .btn-primary:hover {
    background: linear-gradient(135deg, var(--violet-clair), var(--bleu-glace));
    box-shadow: 0 0 30px rgba(123,92,240,0.5);
    transform: translateY(-2px);
  }

  /* ── SECTIONS ── */
  .section-title {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.4rem, 3vw, 2rem);
    font-weight: 700;
    letter-spacing: 0.1em;
    text-align: center;
    margin-bottom: 0.5rem;
    background: linear-gradient(135deg, var(--blanc), var(--argent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .section-eyebrow {
    text-align: center;
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--violet);
    margin-bottom: 0.75rem;
  }

  .section-divider {
    width: 80px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--violet), transparent);
    margin: 1rem auto 3.5rem;
  }

  /* ── RP INFO ── */
  #rp-info {
    padding: 6rem 2rem;
    background: linear-gradient(180deg, #0D1535 0%, #0A0D1A 100%);
  }

  .rp-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 1.5rem;
    max-width: 1100px;
    margin: 0 auto;
  }

  .rp-card {
    background: rgba(30,42,94,0.25);
    border: 1px solid rgba(77,166,255,0.1);
    padding: 2rem;
    transition: border-color 0.3s, transform 0.3s;
  }

  .rp-card:hover {
    border-color: rgba(123,92,240,0.4);
    transform: translateY(-3px);
  }

  .rp-card-icon {
    font-size: 1.8rem;
    margin-bottom: 1rem;
  }

  .rp-card h3 {
    font-family: 'Cinzel', serif;
    font-size: 0.95rem;
    letter-spacing: 0.1em;
    color: var(--bleu-glace);
    margin-bottom: 0.75rem;
  }

  .rp-card p {
    font-size: 0.88rem;
    line-height: 1.7;
    color: rgba(192,200,232,0.75);
  }

  /* ── INSCRIPTION ── */
  #inscription {
    padding: 6rem 2rem;
    background: #06080F;
  }

  .form-wrap {
    max-width: 560px;
    margin: 0 auto;
    background: rgba(13,21,53,0.6);
    border: 1px solid rgba(123,92,240,0.2);
    padding: 3rem 2.5rem;
  }

  .form-group {
    margin-bottom: 1.5rem;
  }

  .form-group label {
    display: block;
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--bleu-glace);
    margin-bottom: 0.5rem;
  }

  .form-group input, .form-group select {
    width: 100%;
    padding: 0.8rem 1rem;
    background: rgba(6,8,15,0.8);
    border: 1px solid rgba(77,166,255,0.2);
    color: var(--argent);
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .form-group input:focus, .form-group select:focus {
    border-color: var(--violet);
  }

  .form-group select option { background: #0A0D1A; }

  /* ── COMMUNAUTÉS ── */
  #communautes {
    padding: 6rem 2rem;
    background: linear-gradient(180deg, #0A0D1A 0%, #0D1535 100%);
  }

  .commu-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 1.2rem;
    max-width: 1100px;
    margin: 0 auto;
  }

  .commu-card {
    background: rgba(13,21,53,0.5);
    border: 1px solid rgba(77,166,255,0.12);
    padding: 1.8rem 1.5rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  .commu-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(123,92,240,0.08), rgba(77,166,255,0.04));
    opacity: 0;
    transition: opacity 0.3s;
  }

  .commu-card:hover::before { opacity: 1; }
  .commu-card:hover {
    border-color: rgba(123,92,240,0.5);
    transform: translateY(-4px);
    box-shadow: 0 8px 30px rgba(123,92,240,0.15);
  }

  .commu-icon {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--violet), var(--bleu-acier));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    margin: 0 auto 1rem;
    border: 1px solid rgba(123,92,240,0.4);
  }

  .commu-name {
    font-family: 'Cinzel', serif;
    font-size: 0.8rem;
    letter-spacing: 0.08em;
    color: var(--argent);
    margin-bottom: 0.5rem;
  }

  .commu-members {
    font-size: 0.7rem;
    color: rgba(192,200,232,0.5);
    letter-spacing: 0.1em;
  }

  .btn-join {
    margin-top: 1rem;
    padding: 0.5rem 1.2rem;
    background: transparent;
    border: 1px solid rgba(123,92,240,0.5);
    color: var(--violet-clair);
    font-size: 0.72rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Inter', sans-serif;
    display: block;
    width: 100%;
    text-decoration: none;
  }

  .btn-join:hover {
    background: rgba(123,92,240,0.2);
    border-color: var(--violet);
    color: white;
  }

  /* ── ACTUALITÉS ── */
  #actualites {
    padding: 6rem 2rem;
    background: #06080F;
  }

  .search-bar {
    max-width: 500px;
    margin: 0 auto 3rem;
    position: relative;
  }

  .search-bar input {
    width: 100%;
    padding: 0.9rem 1.2rem 0.9rem 3rem;
    background: rgba(13,21,53,0.6);
    border: 1px solid rgba(77,166,255,0.2);
    color: var(--argent);
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-bar input:focus { border-color: var(--violet); }
  .search-bar input::placeholder { color: rgba(192,200,232,0.4); }

  .search-icon {
    position: absolute;
    left: 1rem;
    top: 50%;
    transform: translateY(-50%);
    color: rgba(192,200,232,0.4);
    font-size: 1rem;
  }

  .news-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 1.5rem;
    max-width: 1100px;
    margin: 0 auto;
  }

  .news-card {
    background: rgba(13,21,53,0.4);
    border: 1px solid rgba(77,166,255,0.1);
    overflow: hidden;
    transition: all 0.3s;
  }

  .news-card:hover {
    border-color: rgba(123,92,240,0.3);
    transform: translateY(-3px);
  }

  .news-tag {
    display: inline-block;
    padding: 0.25rem 0.75rem;
    background: rgba(123,92,240,0.2);
    border: 1px solid rgba(123,92,240,0.3);
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--violet-clair);
    margin-bottom: 0.75rem;
  }

  .news-card-body { padding: 1.5rem; }

  .news-date {
    font-size: 0.7rem;
    color: rgba(192,200,232,0.4);
    letter-spacing: 0.1em;
    margin-bottom: 0.5rem;
  }

  .news-card h3 {
    font-family: 'Cinzel', serif;
    font-size: 0.95rem;
    color: var(--argent);
    margin-bottom: 0.75rem;
    line-height: 1.4;
  }

  .news-card p {
    font-size: 0.83rem;
    line-height: 1.6;
    color: rgba(192,200,232,0.6);
  }

  /* ── LÉGENDES ── */
  #legendes {
    padding: 6rem 2rem;
    background: linear-gradient(180deg, #0D1535 0%, #06080F 100%);
  }

  .legends-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1.2rem;
    max-width: 1100px;
    margin: 0 auto 4rem;
  }

  .legend-card {
    background: rgba(13,21,53,0.5);
    border: 1px solid rgba(200,168,75,0.2);
    padding: 1.8rem 1.2rem;
    text-align: center;
    transition: all 0.3s;
  }

  .legend-card:hover {
    border-color: rgba(200,168,75,0.5);
    box-shadow: 0 0 20px rgba(200,168,75,0.1);
    transform: translateY(-3px);
  }

  .legend-avatar {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: linear-gradient(135deg, #C8A84B, #7B5CF0);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cinzel', serif;
    font-size: 1.3rem;
    font-weight: 700;
    color: white;
    margin: 0 auto 1rem;
    border: 2px solid rgba(200,168,75,0.4);
  }

  .legend-pseudo {
    font-family: 'Cinzel', serif;
    font-size: 0.85rem;
    color: var(--or);
    margin-bottom: 0.3rem;
  }

  .legend-title {
    font-size: 0.7rem;
    color: rgba(192,200,232,0.5);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .chiefs-section h3 {
    font-family: 'Cinzel', serif;
    font-size: 1.1rem;
    letter-spacing: 0.12em;
    color: var(--bleu-glace);
    text-align: center;
    margin-bottom: 2rem;
  }

  .chiefs-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    justify-content: center;
    max-width: 800px;
    margin: 0 auto;
  }

  .chief-card {
    display: flex;
    align-items: center;
    gap: 1rem;
    background: rgba(30,42,94,0.3);
    border: 1px solid rgba(77,166,255,0.15);
    padding: 1rem 1.5rem;
    min-width: 200px;
    transition: all 0.3s;
  }

  .chief-card:hover {
    border-color: rgba(77,166,255,0.4);
    transform: translateY(-2px);
  }

  .chief-avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--bleu-glace), var(--violet));
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 1rem;
    color: white;
    flex-shrink: 0;
  }

  .chief-info .chief-name {
    font-family: 'Cinzel', serif;
    font-size: 0.85rem;
    color: var(--argent);
  }

  .chief-info .chief-role {
    font-size: 0.68rem;
    color: var(--bleu-glace);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* ── MEMBRES ── */
  #membres {
    padding: 6rem 2rem;
    background: #06080F;
  }

  .members-search {
    max-width: 500px;
    margin: 0 auto 3rem;
    position: relative;
  }

  .members-search input {
    width: 100%;
    padding: 0.9rem 1.2rem 0.9rem 3rem;
    background: rgba(13,21,53,0.6);
    border: 1px solid rgba(77,166,255,0.2);
    color: var(--argent);
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .members-search input:focus { border-color: var(--violet); }
  .members-search input::placeholder { color: rgba(192,200,232,0.4); }

  .members-counter {
    text-align: center;
    font-size: 3rem;
    font-family: 'Cinzel', serif;
    font-weight: 900;
    color: var(--violet);
    margin-bottom: 0.3rem;
  }

  .members-label {
    text-align: center;
    font-size: 0.75rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(192,200,232,0.5);
    margin-bottom: 3rem;
  }

  .members-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 0.8rem;
    max-width: 1000px;
    margin: 0 auto;
  }

  .member-chip {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    background: rgba(13,21,53,0.4);
    border: 1px solid rgba(77,166,255,0.08);
    padding: 0.6rem 0.9rem;
    transition: all 0.2s;
  }

  .member-chip:hover {
    border-color: rgba(123,92,240,0.3);
    background: rgba(30,42,94,0.3);
  }

  .member-dot {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--violet), var(--bleu-acier));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    font-weight: 700;
    color: white;
    flex-shrink: 0;
  }

  .member-info .member-pseudo {
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--argent);
  }

  .member-info .member-nat {
    font-size: 0.68rem;
    color: rgba(192,200,232,0.45);
  }

  /* ── MODAL COMMUNAUTÉ ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(6,8,15,0.92);
    backdrop-filter: blur(8px);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: linear-gradient(160deg, #0D1535, #0A0D1A);
    border: 1px solid rgba(123,92,240,0.3);
    max-width: 600px;
    width: 90%;
    max-height: 80vh;
    overflow-y: auto;
    position: relative;
    transform: translateY(20px);
    transition: transform 0.3s;
  }

  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-header {
    padding: 3rem 2.5rem 2rem;
    text-align: center;
    border-bottom: 1px solid rgba(77,166,255,0.1);
    position: relative;
  }

  .modal-close {
    position: absolute;
    top: 1rem; right: 1rem;
    background: none;
    border: none;
    color: var(--argent);
    font-size: 1.5rem;
    cursor: pointer;
    opacity: 0.6;
    transition: opacity 0.2s;
    line-height: 1;
  }

  .modal-close:hover { opacity: 1; }

  .modal-icon {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--violet), var(--bleu-acier));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    margin: 0 auto 1.2rem;
    border: 2px solid rgba(123,92,240,0.4);
    box-shadow: 0 0 30px rgba(123,92,240,0.3);
    animation: rotate-glow 4s linear infinite;
  }

  @keyframes rotate-glow {
    0%, 100% { box-shadow: 0 0 20px rgba(123,92,240,0.4), 0 0 40px rgba(77,166,255,0.1); }
    50% { box-shadow: 0 0 30px rgba(77,166,255,0.5), 0 0 60px rgba(123,92,240,0.15); }
  }

  .modal-name {
    font-family: 'Cinzel', serif;
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--blanc);
    margin-bottom: 0.3rem;
  }

  .modal-type {
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--bleu-glace);
  }

  .modal-body {
    padding: 2rem 2.5rem;
  }

  .modal-body p {
    font-size: 0.9rem;
    line-height: 1.7;
    color: rgba(192,200,232,0.8);
    margin-bottom: 1.5rem;
  }

  .modal-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 2rem;
  }

  .modal-stat {
    background: rgba(13,21,53,0.6);
    border: 1px solid rgba(77,166,255,0.1);
    padding: 1rem;
    text-align: center;
  }

  .modal-stat-val {
